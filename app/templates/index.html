<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古韵今译 - 白话文转古诗文系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='7') }}">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <div class="logo">
          <i class="fas fa-feather-alt"></i>
        </div>
        <div class="title-container">
          <h1>古韵今译</h1>
          <div class="subtitle">白话文转古诗文系统 · Qwen2-0.5B LoRA 微调 · 当前模式：{{ mode }}</div>
        </div>
      </div>
    </header>

    <div class="main-content">
      <div class="input-section">
        <div class="input-header">
          <h2><i class="fas fa-pencil-alt"></i> 白话文输入</h2>
          <div class="char-counter">0/200 字</div>
        </div>
        <div class="input-container">
          <textarea id="input-text" placeholder="在此输入白话文..."></textarea>
          <div class="watermark" id="watermark">
            <i class="fas fa-feather-alt"></i>
            <div>输入现代白话文</div>
          </div>
        </div>

        <div class="presets-container">
          <div class="presets-title">推荐尝试：</div>
          <div class="presets-list">
            <button class="preset-item" data-text="春天的雨水滋润着大地，万物开始复苏，柳树发出嫩绿的新芽，小草从土壤中钻出来，百花竞相开放">春雨春景</button>
            <button class="preset-item" data-text="山间的流水清澈见底，在阳光下闪闪发光，水中的鱼儿自由游动，岸边的树木倒映在水中，构成一幅美丽的画卷">山水之景</button>
            <button class="preset-item" data-text="月光如水般洒在大地上，照亮了寂静的夜晚，远处的山峦如墨般浓重，近处的湖水泛着银光，偶尔传来几声虫鸣">月夜之美</button>
            <button class="preset-item" data-text="秋高气爽，金风送爽，田野里稻谷飘香，果园里硕果累累，一片丰收的景象让人心旷神怡">金秋丰收</button>
          </div>
        </div>

        <div class="button-row">
          <button class="btn btn-primary" id="generate-btn">
            <i class="fas fa-magic"></i> 转为古诗文
          </button>
          <button class="btn btn-secondary" id="clear-btn">
            <i class="fas fa-eraser"></i> 清空
          </button>
        </div>
      </div>

      <div class="output-section">
        <div class="output-header">
          <h2><i class="fas fa-scroll"></i> 古诗文输出</h2>
          <div class="output-controls">
            <button class="btn btn-icon" id="copy-btn" title="复制文本">
              <i class="fas fa-copy"></i>
            </button>
            <button class="btn btn-icon" id="calligraphy-btn" title="切换书法模式">
              <i class="fas fa-brush"></i>
            </button>
            <button class="btn btn-icon" id="save-btn" title="保存为图片">
              <i class="fas fa-download"></i>
            </button>
          </div>
        </div>

        <div class="poetry-display" id="output-text">
          <div class="poetry-background"></div>
          <div class="poetry-content"></div>
        </div>

        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
          <div class="loading-text">正在生成古诗文...</div>
        </div>
      </div>
    </div>

    <footer>
      AI 产品经理作品集项目 | 作者展示名：JZ | Powered by Qwen2-0.5B LoRA
    </footer>
  </div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="notification-message">操作成功！</div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js', v='7') }}"></script>
</body>
</html>
